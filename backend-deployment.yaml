apiVersion: apps/v1
kind: Deployment

metadata:
  name: netflix-backend
  namespace: default

spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-backend
  template:
    metadata:
      labels:
        app: netflix-backend
    spec:
      containers:
      - name: netflix-backend
        image: saniyagandhi2507/netflix-backend:7
        imagePullPolicy: Always
        ports:
        - containerPort: 5000